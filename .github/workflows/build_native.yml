name: Compile Native Android MediaPipe APK

on:
  workflow_dispatch: # Allows manual trigger execution with a single click

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

    - name: Build Standalone Production APK using Gradle
      run: |
        # Navigates straight to the native hand tracking project directory
        cd examples/hand_landmarker/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Native APK Artifact to Dashboard
      uses: actions/upload-artifact@v4
      with:
        name: Native-MediaPipe-Tracking-APK
        path: examples/hand_landmarker/android/app/build/outputs/apk/debug/app-debug.apk
